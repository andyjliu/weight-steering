base_model: meta-llama/Llama-2-7b-chat-hf
model_type: LlamaForCausalLM
tokenizer_type: LlamaTokenizer

load_in_8bit: true
load_in_4bit: false

datasets:
  - path: cfierro/pv-prompts-non-evil_Llama-2-7b-chat-hf
    type: chat_template
dataset_prepared_path: /workspace/axolotl-datasets/Llama-2-7b-chat/pv-prompts-non-evil
val_set_size: 0.05
output_dir: /workspace/axolotl-outputs/personality_ds_updated/Llama-2-7b-chat-pv-prompts-non-evil_5e-5

sequence_len: 4096
sample_packing: false
eval_sample_packing: false
pad_to_sequence_len: true

adapter: lora
lora_model_dir:
lora_r: 32
lora_alpha: 16
lora_dropout: 0.0
lora_target_linear: true
lora_modules_to_save:
  - embed_tokens
  - lm_head
merge_lora: true

wandb_project: weight-diff-ft
wandb_entity: cfierro
wandb_watch: all
wandb_name: Llama-2-7b-chat-pv-prompts-non-evil_5e-5
wandb_log_model: "false"
#hub_model_id: coastalcph/Llama-2-7b-chat-pv-prompts-non-evil_5e-5

gradient_accumulation_steps: 1
micro_batch_size: 8
max_steps: 150
optimizer: adamw_bnb_8bit
lr_scheduler: linear
learning_rate: 5e-5

bf16: auto
tf32: false

gradient_checkpointing: true
resume_from_checkpoint:
logging_steps: 1
flash_attention: true

num_epochs: 1
warmup_steps: 5
early_stopping_patience: 2
eval_steps: 20 
save_steps: 20
save_total_limit: 1
load_best_model_at_end: true
weight_decay: 0.01
special_tokens:
